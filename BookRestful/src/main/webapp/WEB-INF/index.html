<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #2c5282; --accent-light: #ebf2fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .navbar-custom { background: var(--accent); }
        .page-header { border-bottom: 3px solid var(--accent); padding-bottom: .5rem; margin-bottom: 1.5rem; }
        .synopsis-cell, .chars-cell { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .table { table-layout: fixed; width: 100%; }
        .genre-tag { background: var(--accent-light); color: var(--accent); border: 1px solid #b0c7e4;
                     border-radius: 3px; padding: 2px 8px; font-size: .8rem; display: inline-block; }
        .tbl-header th { background: #f1f5f9; color: #334155; border-bottom: 2px solid #cbd5e1;
                         font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .03em; }
        .tbl-header th a { color: #334155; text-decoration: none; }
        .tbl-header th a:hover { color: var(--accent); }
        .sort-arrow { font-size: .65rem; margin-left: 3px; }
        pre.raw-viewer { font-size: .75rem; max-height: 500px; overflow-y: auto;
                         white-space: pre-wrap; word-break: break-all;
                         background: #1e293b; color: #a5f3fc; border-radius: 6px; padding: 12px; }
        .format-pill { font-size: .7rem; padding: 3px 10px; border-radius: 10px;
                       background: #e2e8f0; color: #475569; font-weight: 600; }
        .confirm-row { background: #fef2f2 !important; }
        .confirm-row td { border-color: #fca5a5 !important; }
        .btn-edit { background: none; border: 1px solid #94a3b8; color: #334155; font-size: .8rem; }
        .btn-edit:hover { background: #f1f5f9; border-color: #64748b; color: #1e293b; }
        .btn-del { background: none; border: 1px solid #fca5a5; color: #dc2626; font-size: .8rem; }
        .btn-del:hover { background: #fef2f2; }
        .modal-header { background: var(--accent); color: white; }
        .modal-header .btn-close { filter: brightness(0) invert(1); }
    </style>
</head>
<body class="bg-white">

<div id="root"></div>

<!-- React 18 via CDN — no build step needed, keeps the project as a single deployable WAR -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel standalone lets us write JSX directly in the browser for development convenience -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="text/babel">
/**
 * React frontend for the Book REST API.
 *
 * Architecture:
 *   - App holds all application state (books, format, search query, modals)
 *   - Child components are pure/presentational where possible
 *   - API calls are plain fetch() with async/await — no extra libraries
 *   - Format negotiation uses both ?format= query param and Accept header,
 *     demonstrating HTTP content negotiation
 *   - Separate parser functions per format (JSON, XML, Text) keep parsing
 *     logic isolated — adding a new format only means a new parser
 *   - All user-supplied data is rendered via React's built-in escaping
 *     (textContent / JSX expressions), preventing XSS without manual escaping
 *   - Client-side validation mirrors server-side Validation.validateBook()
 */

const { useState, useEffect, useRef, useCallback } = React;
const API = 'api/books';

/* ──────────────────────── Helpers ──────────────────────── */

const ACCEPT = { json: 'application/json', xml: 'application/xml', text: 'text/plain' };

function parseBooks(text, fmt) {
    try {
        if (fmt === 'json') return JSON.parse(text);
        if (fmt === 'xml')  return parseBooksXml(text);
        if (fmt === 'text') return parseBooksText(text);
    } catch (e) { console.error('Parse error:', e); }
    return [];
}

function parseBook(text, fmt) {
    try {
        if (fmt === 'json') return JSON.parse(text);
        if (fmt === 'xml')  return parseBookXml(text);
        if (fmt === 'text') return parseBookText(text.split('\n')[0]);
    } catch (e) { console.error('Parse error:', e); }
    return null;
}

function parseBooksXml(xml) {
    const doc = new DOMParser().parseFromString(xml, 'application/xml');
    return Array.from(doc.querySelectorAll('book')).map(xmlNodeToBook);
}

function parseBookXml(xml) {
    const doc = new DOMParser().parseFromString(xml, 'application/xml');
    const n = doc.querySelector('book');
    return n ? xmlNodeToBook(n) : null;
}

function xmlNodeToBook(node) {
    const g = tag => node.querySelector(tag)?.textContent || '';
    return { id: parseInt(g('id')) || 0, title: g('title'), author: g('author'),
             date: g('date'), genres: g('genres'), characters: g('characters'),
             synopsis: g('synopsis') };
}

function parseBooksText(text) {
    return text.trim().split('\n').filter(l => l.trim()).map(parseBookText).filter(Boolean);
}

function parseBookText(line) {
    const p = line.split('|');
    if (p.length < 7) return null;
    return { id: parseInt(p[0]) || 0, title: p[1], author: p[2], date: p[3],
             genres: p[4], characters: p[5], synopsis: p[6] };
}

/** Build the POST/PUT body — XML when xml format selected, JSON otherwise */
function buildBody(book, fmt) {
    if (fmt === 'xml') {
        const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                         .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        return `<?xml version="1.0" encoding="UTF-8"?>
<book>
  <id>${book.id}</id>
  <title>${esc(book.title)}</title>
  <author>${esc(book.author)}</author>
  <date>${esc(book.date)}</date>
  <genres>${esc(book.genres)}</genres>
  <characters>${esc(book.characters)}</characters>
  <synopsis>${esc(book.synopsis)}</synopsis>
</book>`;
    }
    return JSON.stringify(book);
}

// NOTE: client-side validation that mirrors the server-side Validation.java
// checks length, format, and content rules so the user gets instant feedback
const CURRENT_YEAR = new Date().getFullYear();
const AUTHOR_REGEX = /^[a-zA-Z .'\-]+$/;
const YEAR_REGEX = /^\d{4}$/;

function stripHtml(s) {
    return s ? s.replace(/<[^>]*>/g, '').trim() : '';
}

function validateBook(b) {
    const errs = [];
    const title = stripHtml(b.title);
    const author = stripHtml(b.author);
    const date = stripHtml(b.date);
    const genres = stripHtml(b.genres);
    const characters = stripHtml(b.characters);
    const synopsis = stripHtml(b.synopsis);

    if (!title || title.length < 5) errs.push('Title must be at least 5 characters.');
    else if (title.length > 150) errs.push('Title must not exceed 150 characters.');

    if (!author || author.length < 5) errs.push('Author must be at least 5 characters.');
    else if (author.length > 150) errs.push('Author must not exceed 150 characters.');
    else if (!AUTHOR_REGEX.test(author)) errs.push('Author must only contain letters, spaces, hyphens, and apostrophes.');

    if (!date || !date.trim()) errs.push('Date is required.');
    else if (!YEAR_REGEX.test(date.trim())) errs.push('Date must be a valid 4-digit year (e.g. 2003).');
    else {
        const y = parseInt(date.trim());
        if (y > CURRENT_YEAR) errs.push('Date cannot be in the future.');
        else if (y < 1000) errs.push('Date must be a realistic year (1000 or later).');
    }

    if (!genres || genres.length < 3) errs.push('Genres must be at least 3 characters.');
    else if (genres.length > 50) errs.push('Genres must not exceed 50 characters.');

    if (!characters || characters.length < 5) errs.push('Characters must be at least 5 characters.');
    else if (characters.length > 200) errs.push('Characters must not exceed 200 characters.');

    if (!synopsis || synopsis.length < 5) errs.push('Synopsis must be at least 5 characters.');
    else if (synopsis.length > 1000) errs.push('Synopsis must not exceed 1000 characters.');

    return errs;
}

function extractErr(text, fmt) {
    try {
        if (fmt === 'json') return JSON.parse(text)?.error?.message || text;
        if (fmt === 'xml') {
            const doc = new DOMParser().parseFromString(text, 'application/xml');
            return doc.querySelector('message')?.textContent || text;
        }
    } catch (_) {}
    return text;
}


/* ──────────────────────── Components ──────────────────────── */

/** Top navigation bar with format selector and add button */
function Navbar({ format, onFormatChange, onAddClick }) {
    return (
        <nav className="navbar navbar-custom mb-4">
            <div className="container-fluid">
                <div className="d-flex align-items-center gap-3">
                    <span className="navbar-brand text-white fw-bold mb-0">Book Library</span>
                    <button className="btn btn-light btn-sm" onClick={onAddClick}>
                        New Entry
                    </button>
                </div>
                <div className="d-flex align-items-center gap-3">
                    <label className="text-white-50 small mb-0">Format:</label>
                    <select className="form-select form-select-sm"
                            style={{width:'auto'}} value={format}
                            onChange={e => onFormatChange(e.target.value)}>
                        <option value="json">JSON</option>
                        <option value="xml">XML</option>
                        <option value="text">TEXT</option>
                    </select>
                </div>
            </div>
        </nav>
    );
}

/** Search input with enter-key support */
function SearchBar({ onSearch, onClear }) {
    const [q, setQ] = useState('');
    const handleKey = e => { if (e.key === 'Enter') onSearch(q); };
    return (
        <div className="input-group mb-3">
            <input type="text" className="form-control" placeholder="Search by title, author or genre..."
                   maxLength={200} value={q} onChange={e => setQ(e.target.value)} onKeyUp={handleKey} />
            <button className="btn btn-outline-secondary" onClick={() => onSearch(q)}>Go</button>
            <button className="btn btn-outline-secondary" onClick={() => { setQ(''); onClear(); }}>Reset</button>
        </div>
    );
}

/** Single row in the book table — handles inline delete confirmation */
function BookRow({ book, onEdit, onDelete }) {
    const [confirming, setConfirming] = useState(false);

    if (confirming) {
        return (
            <tr className="confirm-row">
                <td colSpan={8} className="py-2 px-3">
                    <div className="d-flex justify-content-between align-items-center">
                        <span>Delete <strong>{book.title}</strong>?</span>
                        <div className="d-flex gap-2">
                            <button className="btn btn-sm btn-outline-secondary"
                                    onClick={() => setConfirming(false)}>Go Back</button>
                            <button className="btn btn-sm btn-danger"
                                    onClick={() => { setConfirming(false); onDelete(book.id); }}>
                                Confirm Removal
                            </button>
                        </div>
                    </div>
                </td>
            </tr>
        );
    }

    return (
        <tr>
            <td>{book.id}</td>
            <td><strong>{book.title}</strong></td>
            <td>{book.author}</td>
            <td>{book.date}</td>
            <td><span className="genre-tag">{book.genres}</span></td>
            <td className="chars-cell text-muted small" title={book.characters || ''}>{book.characters}</td>
            <td className="synopsis-cell text-muted small" title={book.synopsis || ''}>
                {book.synopsis}
            </td>
            <td className="text-center text-nowrap">
                <button className="btn btn-sm btn-del me-1" onClick={() => setConfirming(true)}>Remove</button>
                <button className="btn btn-sm btn-edit" onClick={() => onEdit(book.id)}>Modify</button>
            </td>
        </tr>
    );
}

/** Sortable column header — clicking toggles asc/desc */
function SortHeader({ label, field, sortField, sortOrder, onSort }) {
    const active = sortField === field;
    const arrow = active ? (sortOrder === 'asc' ? '\u25B2' : '\u25BC') : '';
    return (
        <th>
            <a href="#" onClick={e => { e.preventDefault();
                onSort(field, active && sortOrder === 'asc' ? 'desc' : 'asc'); }}>
                {label} {arrow && <span className="sort-arrow">{arrow}</span>}
            </a>
        </th>
    );
}

/** Pagination controls — shows a window of up to 5 page numbers */
function Pagination({ currentPage, totalPages, totalBooks, pageSize, onPageChange }) {
    if (totalPages <= 1) return null;
    const WINDOW = 5;
    let start = Math.max(1, currentPage - Math.floor(WINDOW / 2));
    let end = Math.min(totalPages, start + WINDOW - 1);
    if (end - start < WINDOW - 1) start = Math.max(1, end - WINDOW + 1);
    const pages = [];
    for (let i = start; i <= end; i++) pages.push(i);
    return (
        <div className="card-footer bg-white d-flex justify-content-between align-items-center py-2">
            <small className="text-muted">
                Page {currentPage} of {totalPages} ({totalBooks} books total)
            </small>
            <nav>
                <ul className="pagination pagination-sm mb-0">
                    <li className={`page-item ${currentPage <= 1 ? 'disabled' : ''}`}>
                        <a className="page-link" href="#"
                           onClick={e => { e.preventDefault(); onPageChange(currentPage - 1); }}>Previous</a>
                    </li>
                    {start > 1 && <li className="page-item"><a className="page-link" href="#" onClick={e => { e.preventDefault(); onPageChange(1); }}>1</a></li>}
                    {start > 2 && <li className="page-item disabled"><span className="page-link">…</span></li>}
                    {pages.map(p => (
                        <li key={p} className={`page-item ${p === currentPage ? 'active' : ''}`}>
                            <a className="page-link" href="#"
                               onClick={e => { e.preventDefault(); onPageChange(p); }}>{p}</a>
                        </li>
                    ))}
                    {end < totalPages - 1 && <li className="page-item disabled"><span className="page-link">…</span></li>}
                    {end < totalPages && <li className="page-item"><a className="page-link" href="#" onClick={e => { e.preventDefault(); onPageChange(totalPages); }}>{totalPages}</a></li>}
                    <li className={`page-item ${currentPage >= totalPages ? 'disabled' : ''}`}>
                        <a className="page-link" href="#"
                           onClick={e => { e.preventDefault(); onPageChange(currentPage + 1); }}>Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    );
}

/** Books table — maps over the book list and renders rows with sortable headers */
function BookTable({ books, loading, error, format, onEdit, onDelete,
                     sortField, sortOrder, onSort,
                     currentPage, totalPages, totalBooks, pageSize, onPageChange }) {
    return (
        <div className="card border-0 shadow-sm">
            <div className="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h6 className="mb-0">
                    All Books <span className="text-muted fw-normal ms-1">({totalBooks})</span>
                </h6>
                <span className="format-pill">{format.toUpperCase()}</span>
            </div>
            <div className="table-responsive">
                <table className="table table-hover align-middle mb-0">
                    <thead className="tbl-header">
                        <tr>
                            <SortHeader label="#" field="id" sortField={sortField} sortOrder={sortOrder} onSort={onSort} />
                            <SortHeader label="Title" field="title" sortField={sortField} sortOrder={sortOrder} onSort={onSort} />
                            <SortHeader label="Author" field="author" sortField={sortField} sortOrder={sortOrder} onSort={onSort} />
                            <SortHeader label="Date" field="date" sortField={sortField} sortOrder={sortOrder} onSort={onSort} />
                            <SortHeader label="Genres" field="genres" sortField={sortField} sortOrder={sortOrder} onSort={onSort} />
                            <th>Characters</th>
                            <th>Synopsis</th>
                            <th className="text-center" style={{width:'140px'}}>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {loading ? (
                            <tr><td colSpan={8} className="text-center text-muted py-4">Loading...</td></tr>
                        ) : error ? (
                            <tr><td colSpan={8} className="text-center text-danger py-4">{error}</td></tr>
                        ) : books.length === 0 ? (
                            <tr><td colSpan={8} className="text-center text-muted py-4">No books found.</td></tr>
                        ) : (
                            books.map(b => <BookRow key={b.id} book={b} onEdit={onEdit} onDelete={onDelete} />)
                        )}
                    </tbody>
                </table>
            </div>
            <Pagination currentPage={currentPage} totalPages={totalPages}
                        totalBooks={totalBooks} pageSize={pageSize} onPageChange={onPageChange} />
        </div>
    );
}

/** Raw API response viewer panel */
function RawViewer({ method, text }) {
    return (
        <div className="card border-0 shadow-sm">
            <div className="card-header bg-white py-3">
                <h6 className="mb-0">
                    Raw API Response
                    {method && <small className="text-muted ms-2 fw-normal">{method}</small>}
                </h6>
            </div>
            <div className="card-body p-2">
                <pre className="raw-viewer mb-0">{text || 'No request sent yet.'}</pre>
            </div>
        </div>
    );
}

/** Add / Edit modal form — controlled by parent state */
function BookFormModal({ show, mode, initial, errors, onSave, onClose }) {
    const [form, setForm] = useState({ title:'', author:'', date:'', genres:'', characters:'', synopsis:'' });
    const modalRef = useRef(null);
    const bsModal = useRef(null);

    useEffect(() => {
        if (modalRef.current && !bsModal.current) {
            bsModal.current = new bootstrap.Modal(modalRef.current, { backdrop: 'static' });
        }
    }, []);

    useEffect(() => {
        if (show) {
            setForm(initial || { title:'', author:'', date:'', genres:'', characters:'', synopsis:'' });
            bsModal.current?.show();
        } else {
            bsModal.current?.hide();
        }
    }, [show, initial]);

    const handleChange = field => e => setForm({ ...form, [field]: e.target.value });
    const handleSubmit = e => { e.preventDefault(); onSave(form); };

    return (
        <div className="modal fade" ref={modalRef} tabIndex={-1}
             data-bs-backdrop="static">
            <div className="modal-dialog modal-lg">
                <div className="modal-content">
                    <div className="modal-header">
                        <h5 className="modal-title">{mode === 'edit' ? 'Edit Book' : 'Add Book'}</h5>
                        <button type="button" className="btn-close" onClick={onClose}></button>
                    </div>
                    <form onSubmit={handleSubmit}>
                        <div className="modal-body">
                            {errors && errors.length > 0 && (
                                <div className="alert alert-danger py-2">
                                    {errors.map((e,i) => <div key={i}>{e}</div>)}
                                </div>
                            )}
                            <div className="row g-3">
                                <div className="col-md-6">
                                    <label className="form-label">Title <span className="text-danger">*</span></label>
                                    <input type="text" className="form-control" maxLength={150}
                                           value={form.title} onChange={handleChange('title')} />
                                </div>
                                <div className="col-md-6">
                                    <label className="form-label">Author <span className="text-danger">*</span></label>
                                    <input type="text" className="form-control" maxLength={150}
                                           value={form.author} onChange={handleChange('author')} />
                                </div>
                                <div className="col-md-4">
                                    <label className="form-label">Date <span className="text-danger">*</span></label>
                                    <input type="text" className="form-control" maxLength={20}
                                           placeholder="e.g. 2003" value={form.date}
                                           onChange={handleChange('date')} />
                                </div>
                                <div className="col-md-8">
                                    <label className="form-label">Genres <span className="text-danger">*</span></label>
                                    <input type="text" className="form-control" maxLength={50}
                                           value={form.genres} onChange={handleChange('genres')} />
                                </div>
                                <div className="col-12">
                                    <label className="form-label">Characters <span className="text-danger">*</span></label>
                                    <input type="text" className="form-control" maxLength={200}
                                           placeholder="Comma-separated character names"
                                           value={form.characters} onChange={handleChange('characters')} />
                                </div>
                                <div className="col-12">
                                    <label className="form-label">Synopsis <span className="text-danger">*</span></label>
                                    <textarea className="form-control" rows={3}
                                              value={form.synopsis} onChange={handleChange('synopsis')} />
                                </div>
                            </div>
                        </div>
                        <div className="modal-footer">
                            <button type="button" className="btn btn-secondary" onClick={onClose}>Discard</button>
                            <button type="submit" className="btn text-white"
                                    style={{background:'var(--accent)'}}>
                                {mode === 'edit' ? 'Save Changes' : 'Submit'}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    );
}


/* ──────────────────────── App (root) ──────────────────────── */

function App() {
    const [books, setBooks]       = useState([]);
    const [format, setFormat]     = useState('json');
    const [loading, setLoading]   = useState(true);
    const [tableErr, setTableErr] = useState('');
    const [rawMethod, setRawMethod] = useState('');
    const [rawText, setRawText]   = useState('');

    // Sorting state
    const [sortField, setSortField] = useState('title');
    const [sortOrder, setSortOrder] = useState('asc');

    // Pagination state
    const [currentPage, setCurrentPage] = useState(1);
    const [totalPages, setTotalPages]   = useState(1);
    const [totalBooks, setTotalBooks]   = useState(0);
    const PAGE_SIZE = 5;

    // Search state
    const [searchQuery, setSearchQuery] = useState('');

    // Modal state
    const [modalShow, setModalShow]     = useState(false);
    const [modalMode, setModalMode]     = useState('add');
    const [modalInit, setModalInit]     = useState(null);
    const [modalErrors, setModalErrors] = useState([]);
    const [editId, setEditId]           = useState(null);

    const showRaw = (method, url, text) => {
        setRawMethod(method + ' ' + url);
        setRawText(text);
    };

    /* -- Load books with sort and pagination -- */
    const loadBooks = useCallback(async (page, sort, order, search) => {
        setLoading(true);
        setTableErr('');
        let url = `${API}?format=${format}&sort=${sort}&order=${order}&page=${page}&size=${PAGE_SIZE}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        try {
            const res  = await fetch(url, { headers: { Accept: ACCEPT[format] } });
            const text = await res.text();
            showRaw('GET', url, text);
            setBooks(parseBooks(text, format));
            // NOTE: read pagination info from response headers
            const tc = res.headers.get('X-Total-Count');
            const tp = res.headers.get('X-Total-Pages');
            const cp = res.headers.get('X-Current-Page');
            if (tc) setTotalBooks(parseInt(tc));
            if (tp) setTotalPages(parseInt(tp));
            if (cp) setCurrentPage(parseInt(cp));
        } catch (err) {
            setTableErr('Could not connect to API: ' + err.message);
        }
        setLoading(false);
    }, [format]);

    useEffect(() => { loadBooks(currentPage, sortField, sortOrder, searchQuery); }, [format]);

    const loadAll = () => {
        setSearchQuery('');
        setCurrentPage(1);
        loadBooks(1, sortField, sortOrder, '');
    };

    /* -- Sort handler -- */
    const handleSort = (field, order) => {
        setSortField(field);
        setSortOrder(order);
        setCurrentPage(1);
        loadBooks(1, field, order, searchQuery);
    };

    /* -- Page change handler -- */
    const handlePageChange = (page) => {
        setCurrentPage(page);
        loadBooks(page, sortField, sortOrder, searchQuery);
    };

    /* -- Search -- */
    const handleSearch = (q) => {
        if (!q.trim()) { loadAll(); return; }
        setSearchQuery(q);
        setCurrentPage(1);
        loadBooks(1, sortField, sortOrder, q);
    };

    /* ── Open add modal ── */
    const openAdd = () => {
        setModalMode('add');
        setEditId(null);
        setModalInit({ title:'', author:'', date:'', genres:'', characters:'', synopsis:'' });
        setModalErrors([]);
        setModalShow(true);
    };

    /* ── Open edit modal ── */
    const openEdit = async (id) => {
        const url = `${API}?id=${id}&format=${format}`;
        try {
            const res  = await fetch(url, { headers: { Accept: ACCEPT[format] } });
            const text = await res.text();
            showRaw('GET', url, text);
            const b = parseBook(text, format);
            if (!b) { setTableErr('Could not load book for editing.'); return; }
            setModalMode('edit');
            setEditId(id);
            setModalInit({
                title: b.title || '', author: b.author || '', date: b.date || '',
                genres: b.genres || '', characters: b.characters || '', synopsis: b.synopsis || ''
            });
            setModalErrors([]);
            setModalShow(true);
        } catch (err) {
            setTableErr('Error loading book: ' + err.message);
        }
    };

    /* ── Save (add or edit) ── */
    const handleSave = async (formData) => {
        const book = {
            id: editId || 0,
            title: formData.title.trim(), author: formData.author.trim(),
            date: formData.date.trim(), genres: formData.genres.trim(),
            characters: formData.characters.trim(), synopsis: formData.synopsis.trim()
        };

        const errs = validateBook(book);
        if (errs.length) { setModalErrors(errs); return; }

        const isEdit = modalMode === 'edit';
        const method = isEdit ? 'PUT' : 'POST';
        const url    = isEdit ? `${API}?id=${editId}&format=${format}` : `${API}?format=${format}`;
        const body   = buildBody(book, format);
        const ctype  = format === 'xml' ? 'application/xml' : 'application/json';

        try {
            const res  = await fetch(url, {
                method, headers: { 'Content-Type': ctype, Accept: ACCEPT[format] }, body
            });
            const text = await res.text();
            showRaw(method, url, text);
            if (res.ok || res.status === 201) {
                setModalShow(false);
                loadBooks(currentPage, sortField, sortOrder, searchQuery);
            } else {
                setModalErrors(['Server: ' + extractErr(text, format)]);
            }
        } catch (err) {
            setModalErrors(['Network error: ' + err.message]);
        }
    };

    /* ── Delete (no popup — handled inline in BookRow) ── */
    const handleDelete = async (id) => {
        const url = `${API}?id=${id}&format=${format}`;
        try {
            const res = await fetch(url, { method: 'DELETE' });
            showRaw('DELETE', url, res.status === 204 ? '204 No Content' : await res.text());
            loadBooks(currentPage, sortField, sortOrder, searchQuery);
        } catch (err) {
            setTableErr('Delete failed: ' + err.message);
        }
    };

    return (
        <div>
            <Navbar format={format} onFormatChange={setFormat} onAddClick={openAdd} />
            <div className="container-fluid px-4">
                <div className="row g-4">
                    <div className="col-xl-8">
                        <SearchBar onSearch={handleSearch} onClear={loadAll} />
                        <BookTable books={books} loading={loading} error={tableErr}
                                   format={format} onEdit={openEdit} onDelete={handleDelete}
                                   sortField={sortField} sortOrder={sortOrder} onSort={handleSort}
                                   currentPage={currentPage} totalPages={totalPages}
                                   totalBooks={totalBooks} pageSize={PAGE_SIZE}
                                   onPageChange={handlePageChange} />
                    </div>
                    <div className="col-xl-4">
                        <RawViewer method={rawMethod} text={rawText} />
                    </div>
                </div>
            </div>
            <BookFormModal show={modalShow} mode={modalMode} initial={modalInit}
                           errors={modalErrors} onSave={handleSave}
                           onClose={() => setModalShow(false)} />
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
